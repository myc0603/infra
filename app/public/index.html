<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple CRUD</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Space Grotesk", "IBM Plex Sans", system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: radial-gradient(1200px 600px at 10% -10%, #f5efe6, #f8fbff);
        color: #1b1b1b;
      }
      .page {
        max-width: 720px;
        margin: 48px auto;
        background: #ffffffcc;
        backdrop-filter: blur(6px);
        border: 1px solid #e4e4e4;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 18px 60px rgba(17, 24, 39, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 20px;
        color: #5a5a5a;
      }
      form {
        display: flex;
        gap: 12px;
        margin-bottom: 18px;
      }
      input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid #d7d7d7;
        font-size: 14px;
      }
      button {
        border: none;
        border-radius: 12px;
        padding: 10px 14px;
        background: #222222;
        color: white;
        cursor: pointer;
        font-weight: 600;
      }
      button.ghost {
        background: #efefef;
        color: #222222;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }
      li {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 12px;
        border-radius: 14px;
        background: #ffffff;
        border: 1px solid #ededed;
      }
      .meta {
        font-size: 12px;
        color: #7a7a7a;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      @media (max-width: 640px) {
        form {
          flex-direction: column;
        }
        li {
          grid-template-columns: 1fr;
        }
        .actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="/app.js"></script>
  </body>
</html>
